<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Escalibur App</title>

  <link
    rel="manifest"
    href="manifest.json"
  >

  <link
    rel="stylesheet"
    href="styles.css"
  >

</head>

<body>

  <main class="home-container">

    <section class="home-card">

      <div class="logo-area">

        <h1>
          Escalibur App
        </h1>

      </div>

      <a
        href="dinero.html"
        class="menu-button"
      >
        Consultar Dinero
      </a>

      <a
        href="reservas.html"
        class="menu-button"
      >
        Reserva Trabajos
      </a>

      <div class="admin-section">

        <button
          id="toggleAdminTools"
          class="admin-toggle"
        >
          Herramientas avanzadas
        </button>

        <div
          id="adminTools"
          class="admin-tools"
        >

          <button
            id="btnExportBackup"
            class="admin-button"
          >
            Descargar Respaldo
          </button>

    
          <button
            id="btnDeleteData"
            class="admin-button danger"
          >
            Borrar Datos
          </button>

        </div>

      </div>

    </section>

  </main>

  <script src="app.js"></script>

  <script>

  /*
  ====================================
  STORAGE KEYS
  ====================================
  */

  const MONEY_KEY =
    "kaz_movimientos";

  const RESERVAS_KEY =
    "kaz_reservas";

  /*
  ====================================
  DESCARGAR RESPALDO COMPLETO
  ====================================
  */

  document
    .getElementById(
      "btnExportBackup"
    )
    .addEventListener(
      "click",
      () => {

        const respaldo = {

          fecha:
            new Date()
              .toISOString(),

          movimientos:
            JSON.parse(
              localStorage.getItem(
                MONEY_KEY
              )
            ) || [],

          reservas:
            JSON.parse(
              localStorage.getItem(
                RESERVAS_KEY
              )
            ) || []

        };

        const json =
          JSON.stringify(
            respaldo,
            null,
            2
          );

        const blob =
          new Blob(
            [json],
            {
              type:
              "application/json"
            }
          );

        const url =
          URL.createObjectURL(
            blob
          );

        const a =
          document.createElement(
            "a"
          );

        a.href = url;

        a.download =
          "escalibur_respaldo.json";

        a.click();

        URL.revokeObjectURL(
          url
        );

      }
    );

  /*
  ====================================
  ESTADO FINANCIERO
  ====================================
  */

  document
    .getElementById(
      "btnFinancialReport"
    )
    .addEventListener(
      "click",
      () => {

        const movimientos =
          JSON.parse(
            localStorage.getItem(
              MONEY_KEY
            )
          ) || [];

        const reservas =
          JSON.parse(
            localStorage.getItem(
              RESERVAS_KEY
            )
          ) || [];

        const saldoActual =
          movimientos.reduce(
            (acc,mov) =>
              acc +
              Number(
                mov.cantidad || 0
              ),
            0
          );

        const totalReservado =
          reservas.reduce(
            (acc,reserva) =>
              acc +
              Number(
                reserva.precio || 0
              ),
            0
          );

        const totalRecibido =
          reservas.reduce(
            (acc,reserva) =>
              acc +
              Number(
                reserva.recibido || 0
              ),
            0
          );

        const pendiente =
          totalReservado -
          totalRecibido;

        const reporte =
`ESTADO FINANCIERO ESCALIBUR

Fecha:
${new Date().toLocaleDateString("es-MX")}

--------------------------------

Saldo actual:
$${saldoActual.toFixed(2)}

--------------------------------

Reservas registradas:
${reservas.length}

Valor total de trabajos:
$${totalReservado.toFixed(2)}

Dinero recibido:
$${totalRecibido.toFixed(2)}

Pendiente por cobrar:
$${pendiente.toFixed(2)}

--------------------------------

Movimientos registrados:
${movimientos.length}
`;

        const blob =
          new Blob(
            [reporte],
            {
              type:
              "text/plain"
            }
          );

        const url =
          URL.createObjectURL(
            blob
          );

        const a =
          document.createElement(
            "a"
          );

        a.href = url;

        a.download =
          "estado_financiero.txt";

        a.click();

        URL.revokeObjectURL(
          url
        );

      }
    );

  /*
  ====================================
  BORRAR DATOS
  ====================================
  */

  document
    .getElementById(
      "btnDeleteData"
    )
    .addEventListener(
      "click",
      () => {

        const confirmDelete =
          confirm(
            "¿Eliminar todos los datos de dinero y reservas?"
          );

        if(
          !confirmDelete
        ){
          return;
        }

        localStorage.removeItem(
          MONEY_KEY
        );

        localStorage.removeItem(
          RESERVAS_KEY
        );

        alert(
          "Datos eliminados correctamente."
        );

      }
    );

  /*
  ====================================
  PANEL OCULTABLE
  ====================================
  */

  const ADMIN_STORAGE_KEY =
    "kaz_admin_tools_hidden";

  const toggleAdminTools =
    document.getElementById(
      "toggleAdminTools"
    );

  const adminTools =
    document.getElementById(
      "adminTools"
    );

  const hidden =
    localStorage.getItem(
      ADMIN_STORAGE_KEY
    ) === "true";

  if(hidden){

    adminTools.classList.add(
      "hidden"
    );

    toggleAdminTools.textContent =
      "Mostrar herramientas avanzadas";

  }else{

    toggleAdminTools.textContent =
      "Ocultar herramientas avanzadas";

  }

  toggleAdminTools.addEventListener(
    "click",
    () => {

      adminTools.classList.toggle(
        "hidden"
      );

      const isHidden =
        adminTools.classList.contains(
          "hidden"
        );

      localStorage.setItem(
        ADMIN_STORAGE_KEY,
        isHidden
      );

      toggleAdminTools.textContent =
        isHidden
        ? "Mostrar herramientas avanzadas"
        : "Ocultar herramientas avanzadas";

    }
  );

  </script>

</body>
</html>
